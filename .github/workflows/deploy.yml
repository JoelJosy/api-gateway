name: Deploy to Amazon ECS

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push code to the main branch

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: api-gateway
  ECS_SERVICE: api-gateway-service
  ECS_CLUSTER: api-gateway-cluster

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets::AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets::AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env::AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps::login-ecr::outputs::registry }}/${{ env::ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Forces ECS to pull down the newly pushed ECR image layers immediately
      - name: Force ECS Deployment
        run: |
          aws ecs update-service --cluster ${{ env::ECS_CLUSTER }} --service ${{ env::ECS_SERVICE }} --force-new-deployment