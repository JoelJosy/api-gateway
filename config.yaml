port: 8080
redis:
  address: "localhost:6379"
rate_limit:
  max_tokens: 5        # Bucket size
  refill_rate: 1        # Tokens added per second
  key_by: "ip"     # "ip" or "user_id"
proxy:
  dial_timeout: "5s"
  tls_handshake_timeout: "5s"
  response_header_timeout: "5s"
  circuit_breaker_threshold: 5
  circuit_breaker_cooldown: "20s"
routes:
  - path: /typicode
    upstream: https://jsonplaceholder.typicode.com
    auth_required: true
  - path: /public
    upstream: https://jsonplaceholder.typicode.com
    auth_required: false
public_key_path: "certs/public.pem"